<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Snake World</title>
    <link rel="icon" href="data:," />
    <style>
      :root {
        color-scheme: dark;
        background: #11160f;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        overflow: hidden;
        background: #11160f;
        color: #ecffd5;
        font-family: "Courier New", monospace;
      }

      #game {
        width: min(100vw, 150vh);
        max-width: 960px;
        aspect-ratio: 3 / 2;
        background: #1f4f31;
        box-shadow: 0 0 0 2px #2b4a2f, 0 18px 70px rgba(0, 0, 0, 0.55);
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      .fallback {
        position: fixed;
        inset: auto 1rem 1rem;
        max-width: 42rem;
        color: #cfe7b7;
        font: 14px/1.4 "Courier New", monospace;
        text-align: center;
      }

      .fallback[hidden] {
        display: none;
      }
    </style>
  </head>
  <body>
    <main id="game" aria-label="Snake World game"></main>
    <p class="fallback" id="load-help" hidden>
      Phaser did not load. Start a local server and check the browser console.
    </p>
    <script>
      window.addEventListener("error", (event) => {
        if (event.target && event.target.tagName === "SCRIPT") {
          document.getElementById("load-help").hidden = false;
        }
      }, true);
    </script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>
    <script type="module" src="src/main.js"></script>
  </body>
</html>
